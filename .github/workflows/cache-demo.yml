name: Cache Demo

on: [push]

jobs:
  demo:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: prime-cache-95625b9
      id: cache-step
      uses: actions/cache@v4
      with:
        path: ~/.cache
        key: cache-95625b9
        
    - name: Echo cache result
      run: |
        echo "Cache result: ${{ steps.cache-step.outputs.cache-hit }}"
